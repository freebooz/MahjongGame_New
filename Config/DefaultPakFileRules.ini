; Linux is the production Dedicated Server platform for this project.
; The Editor cooker can still discover client-only soft dependencies while
; hosting a server cook, so enforce the final package boundary at staging too.
[ExcludeClientContentForLinuxServer]
Platforms="Linux"
Targets="Development,Shipping"
bExcludeFromPaks=true
bOverrideChunkManifest=true
+Files=".../GuiyangMahjong/Content/Client/..."
+Files=".../GuiyangMahjong/Content/UI/..."
+Files=".../GuiyangMahjong/Content/Art/..."
+Files=".../GuiyangMahjong/Content/Maps/MahjongRoomVisualPreviewMap.*"
