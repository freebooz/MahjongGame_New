apiVersion: v1
kind: Secret
metadata:
  name: mahjong-secrets
  namespace: guiyang-mahjong
type: Opaque
stringData:
  Auth__TokenSigningKey: replace-before-apply
  Auth__GuestIdentityPepper: replace-before-apply
  Auth__PostgresConnectionString: replace-before-apply
  Lobby__TokenSigningKey: replace-before-apply
  Lobby__JoinTicketSigningKey: replace-before-apply
  Lobby__InternalServiceToken: replace-before-apply
  Lobby__Persistence__PostgresConnectionString: replace-before-apply
  Lobby__Allocator__ServiceToken: replace-before-apply
  Allocator__ServiceToken: replace-before-apply
  Allocator__LobbyCallbackToken: replace-before-apply
  Allocator__JoinTicketSigningKey: replace-before-apply
