apiVersion: apps/v1
kind: Deployment
metadata:
  name: mahjong-auth
  namespace: guiyang-mahjong
spec:
  replicas: 2
  selector: {matchLabels: {app: mahjong-auth}}
  template:
    metadata: {labels: {app: mahjong-auth}}
    spec:
      containers:
        - name: auth
          image: ghcr.io/freebooz/guiyang-mahjong-auth:latest
          ports: [{name: http, containerPort: 8080}]
          envFrom:
            - configMapRef: {name: mahjong-services}
            - secretRef: {name: mahjong-secrets}
          readinessProbe:
            httpGet: {path: /health/ready, port: http}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet: {path: /health/live, port: http}
            periodSeconds: 15
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: mahjong-auth
  namespace: guiyang-mahjong
spec:
  selector: {app: mahjong-auth}
  ports: [{name: http, port: 8080, targetPort: http}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mahjong-lobby
  namespace: guiyang-mahjong
spec:
  replicas: 2
  selector: {matchLabels: {app: mahjong-lobby}}
  template:
    metadata: {labels: {app: mahjong-lobby}}
    spec:
      containers:
        - name: lobby
