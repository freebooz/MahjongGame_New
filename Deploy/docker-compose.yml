name: guiyang-mahjong

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mahjong
      POSTGRES_USER: mahjong
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahjong -d mahjong"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth:
    build:
      context: ..
      dockerfile: Services/GuiyangMahjong.Auth/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Auth__PersistenceMode: Postgres
      Auth__PostgresConnectionString: Host=postgres;Port=5432;Database=mahjong;Username=mahjong;Password=${POSTGRES_PASSWORD}
      Auth__TokenSigningKey: ${PLAYER_TOKEN_SIGNING_KEY:?set PLAYER_TOKEN_SIGNING_KEY}
      Auth__GuestIdentityPepper: ${GUEST_IDENTITY_PEPPER:?set GUEST_IDENTITY_PEPPER}
    depends_on:
      postgres: {condition: service_healthy}
    ports: ["18082:8080"]
    restart: unless-stopped

  lobby:
    build:
      context: ..
      dockerfile: Services/GuiyangMahjong.Lobby/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Lobby__Persistence__Mode: RedisPostgres
      Lobby__Persistence__RedisConnectionString: redis:6379,abortConnect=false
      Lobby__Persistence__PostgresConnectionString: Host=postgres;Port=5432;Database=mahjong;Username=mahjong;Password=${POSTGRES_PASSWORD}
      Lobby__TokenSigningKey: ${PLAYER_TOKEN_SIGNING_KEY:?set PLAYER_TOKEN_SIGNING_KEY}
      Lobby__JoinTicketSigningKey: ${JOIN_TICKET_SIGNING_KEY:?set JOIN_TICKET_SIGNING_KEY}
      Lobby__InternalServiceToken: ${LOBBY_INTERNAL_TOKEN:?set LOBBY_INTERNAL_TOKEN}
      Lobby__Allocator__Enabled: "false"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    ports: ["18080:8080"]
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
