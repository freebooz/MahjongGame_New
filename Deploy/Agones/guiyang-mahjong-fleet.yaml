apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: guiyang-mahjong
  namespace: guiyang-mahjong
  labels:
    app.kubernetes.io/name: guiyang-mahjong
    app.kubernetes.io/component: game-server
spec:
  replicas: 2
  scheduling: Packed
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guiyang-mahjong
        app.kubernetes.io/component: game-server
        mahjong.freebooz/game: guiyang-zhua-ji
    spec:
      ports:
        - name: game
          portPolicy: Dynamic
          containerPort: 7777
          protocol: UDP
      health:
        disabled: false
        initialDelaySeconds: 90
        periodSeconds: 5
        failureThreshold: 6
      sdkServer:
        logLevel: Info
      template:
        spec:
          terminationGracePeriodSeconds: 60
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: game-server
              # CI must replace this value with an immutable digest or release tag.
              image: ghcr.io/freebooz/guiyang-mahjong-server:REPLACE_WITH_IMMUTABLE_TAG
              imagePullPolicy: IfNotPresent
              args:
                - /Game/Maps/MahjongRoomMap
                - -server
                - -log
                - -unattended
                - -port=7777
                - -MahjongOrchestrator=Agones
              env:
                - name: MAHJONG_ORCHESTRATOR
                  value: agones
                - name: MAHJONG_BUILD_VERSION
                  value: REPLACE_WITH_BUILD_VERSION
                - name: MAHJONG_JOIN_TICKET_SIGNING_KEY
                  valueFrom:
                    secretKeyRef:
                      name: mahjong-secrets
                      key: Allocator__JoinTicketSigningKey
                - name: MAHJONG_MATCH_RESULT_OUTBOX_PATH
                  value: /tmp/guiyang-mahjong-match-result.json
              ports:
                - name: game
                  containerPort: 7777
                  protocol: UDP
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
