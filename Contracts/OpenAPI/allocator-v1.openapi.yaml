openapi: 3.1.0
info:
  title: Guiyang Mahjong GameServer Allocator API
  version: 1.0.0
  description: Internal process allocation, registration, heartbeat, drain, and inspection contract.
servers:
  - url: http://127.0.0.1:18081
security:
  - serviceBearer: []
paths:
  /internal/allocations:
    post:
      operationId: allocateGameServer
      parameters: [{ $ref: '#/components/parameters/RequestId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AllocationRequest' }
      responses:
        '202':
          description: Process launch accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AllocationResponse' }
        default: { $ref: '#/components/responses/Error' }
  /internal/instances:
    get:
      operationId: listGameServerInstances
      responses:
        '200':
          description: Current and terminal instances.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/InstanceSnapshot' }
  /internal/instances/{serverInstanceId}:
    get:
      operationId: getGameServerInstance
      parameters: [{ $ref: '#/components/parameters/ServerInstanceId' }]
      responses:
        '200':
          description: Instance snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstanceSnapshot' }
        '404': { description: Instance not found. }
  /internal/instances/{serverInstanceId}/register:
    post:
      operationId: confirmGameServerRegistration
      parameters:
        - $ref: '#/components/parameters/ServerInstanceId'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrationRequest' }
      responses:
        '200':
          description: One-time registration exchanged for a heartbeat credential.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrationResponse' }
        default: { $ref: '#/components/responses/Error' }
  /internal/instances/{serverInstanceId}/heartbeat:
    post:
      operationId: recordGameServerHeartbeat
      parameters: [{ $ref: '#/components/parameters/ServerInstanceId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HeartbeatRequest' }
      responses:
        '204': { description: Heartbeat accepted. }
        default: { $ref: '#/components/responses/Error' }
  /internal/instances/{serverInstanceId}/drain:
    post:
      operationId: drainGameServer
      parameters: [{ $ref: '#/components/parameters/ServerInstanceId' }]
      responses:
        '200':
          description: Instance stopped and port returned.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstanceSnapshot' }
        default: { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    serviceBearer:
      type: http
      scheme: bearer
      bearerFormat: internal-service-token
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: true
      schema: { type: string, format: uuid }
    ServerInstanceId:
      name: serverInstanceId
      in: path
      required: true
      schema: { type: string, format: uuid }
  responses:
    Error:
      description: Stable allocator error.
      content:
        application/problem+json:
          schema:
            type: object
            required: [requestId, code, message]
            properties:
              requestId: { type: string }
              code: { type: string }
              message: { type: string }
  schemas:
    AllocationRequest:
      type: object
      required: [roomId, matchId, buildVersion]
      properties:
        roomId: { type: string, format: uuid }
        matchId: { type: string, format: uuid }
        buildVersion: { type: string, minLength: 1, maxLength: 80 }
    AllocationResponse:
      type: object
      required: [requestId, roomId, serverInstanceId, port, state]
      properties:
        requestId: { type: string, format: uuid }
        roomId: { type: string, format: uuid }
        serverInstanceId: { type: string, format: uuid }
        port: { type: integer, minimum: 1024, maximum: 65535 }
        state: { $ref: '#/components/schemas/InstanceState' }
    RegistrationRequest:
      type: object
      required: [roomId, listenIp, listenPort, buildVersion, registrationCredential]
      properties:
        roomId: { type: string, format: uuid }
        listenIp: { type: string }
        listenPort: { type: integer, minimum: 1024, maximum: 65535 }
        buildVersion: { type: string }
        registrationCredential: { type: string, writeOnly: true, minLength: 32 }
    RegistrationResponse:
      type: object
      required: [requestId, serverInstanceId, accepted, heartbeatIntervalSeconds, heartbeatCredential]
      properties:
        requestId: { type: string, format: uuid }
        serverInstanceId: { type: string, format: uuid }
        accepted: { type: boolean }
        heartbeatIntervalSeconds: { type: integer, minimum: 1, maximum: 60 }
        heartbeatCredential: { type: string, writeOnly: true, minLength: 32 }
    HeartbeatRequest:
      type: object
      required: [roomId, heartbeatCredential, connectedPlayers, roomLifecycle, roundId, buildVersion, sentAtUtc]
      properties:
        roomId: { type: string, format: uuid }
        heartbeatCredential: { type: string, writeOnly: true, minLength: 32 }
        connectedPlayers: { type: integer, minimum: 0, maximum: 4 }
        roomLifecycle: { type: string }
        roundId: { type: integer, minimum: 0 }
        buildVersion: { type: string }
        sentAtUtc: { type: string, format: date-time }
    InstanceSnapshot:
      type: object
      required: [serverInstanceId, roomId, matchId, port, advertisedIp, state, startedAtUtc, buildVersion]
      properties:
        serverInstanceId: { type: string, format: uuid }
        roomId: { type: string, format: uuid }
        matchId: { type: string, format: uuid }
        port: { type: integer }
        advertisedIp: { type: string }
        processId: { type: [integer, 'null'] }
        state: { $ref: '#/components/schemas/InstanceState' }
        startedAtUtc: { type: string, format: date-time }
        registeredAtUtc: { type: [string, 'null'], format: date-time }
        lastHeartbeatAtUtc: { type: [string, 'null'], format: date-time }
        buildVersion: { type: string }
        failureReason: { type: [string, 'null'] }
    InstanceState:
      type: string
      enum: [Starting, Ready, Allocated, Draining, Stopped, Failed]
